<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Immersive Media Grid</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="page-shell">
    <video
      class="background-video"
      id="backgroundVideo"
      autoplay
      muted
      loop
      playsinline
      webkit-playsinline
      preload="auto"
      aria-hidden="true"
    ></video>

    <div class="background-scrim" aria-hidden="true"></div>

    <audio
      id="backgroundMusic"
      loop
      preload="auto"
      playsinline
      webkit-playsinline
    ></audio>

    <audio
      id="changeSound"
      preload="auto"
      playsinline
      webkit-playsinline
    ></audio>

    <button class="search-fab" id="searchFab" type="button" aria-label="打开搜索">
      <img src="./assets/ui/button.png" alt="" aria-hidden="true">
    </button>

    <section class="search-panel" id="searchPanel" aria-hidden="true">
      <div class="search-panel-shell">
        <form class="search-form" id="searchForm" novalidate>
          <input
            class="search-input"
            id="searchInput"
            type="text"
            autocomplete="off"
            placeholder="请输入您的用户名进行检索"
          >
          <button class="search-submit" type="submit" aria-label="搜索">
            <img src="./assets/ui/search.png" alt="" aria-hidden="true">
          </button>
        </form>
      </div>
    </section>

    <section class="dialog-layer" id="dialogLayer" hidden aria-hidden="true">
      <div class="dialog-backdrop"></div>
      <div
        class="dialog-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="dialogMessage"
      >
        <p class="dialog-message" id="dialogMessage"></p>
        <button class="dialog-confirm" id="dialogConfirm" type="button">确认</button>
      </div>
    </section>

    <section class="content-layer" aria-label="Random media showcase">
      <div class="grid-shell" id="gridShell">
        <article class="image-frame" data-frame-index="0">
          <div class="image-stage">
            <img class="stage-image is-active" alt="showcase image 1">
            <img class="stage-image" alt="showcase image 1 next">
          </div>
          <img class="frame-overlay" alt="" aria-hidden="true">
        </article>

        <article class="image-frame" data-frame-index="1">
          <div class="image-stage">
            <img class="stage-image is-active" alt="showcase image 2">
            <img class="stage-image" alt="showcase image 2 next">
          </div>
          <img class="frame-overlay" alt="" aria-hidden="true">
        </article>

        <article class="image-frame" data-frame-index="2">
          <div class="image-stage">
            <img class="stage-image is-active" alt="showcase image 3">
            <img class="stage-image" alt="showcase image 3 next">
          </div>
          <img class="frame-overlay" alt="" aria-hidden="true">
        </article>

        <article class="image-frame" data-frame-index="3">
          <div class="image-stage">
            <img class="stage-image is-active" alt="showcase image 4">
            <img class="stage-image" alt="showcase image 4 next">
          </div>
          <img class="frame-overlay" alt="" aria-hidden="true">
        </article>
      </div>

      <p class="status-banner" id="statusBanner" role="status" aria-live="polite" hidden></p>
    </section>
  </main>

  <script src="./assets/images/image-manifest.js"></script>
  <script src="./script.js"></script>
</body>
</html>
